version: '3.8'

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: cucu-nginx
    depends_on:
      - django
      - payment-service
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped

  django:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cucu-django
    command: python manage.py runserver 0.0.0.0:8000
    environment:
      - DEBUG=True
      - DJANGO_SETTINGS_MODULE=config.settings
    volumes:
      - .:/app
    expose:
      - "8000"
    restart: unless-stopped

  payment-service:
    build:
      context: ./payment_microservice
      dockerfile: Dockerfile
    container_name: cucu-payment-service
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - PAYMENTS_DATABASE_PATH=/app/data/payments.db
    volumes:
      - payment_data:/app/data
    expose:
      - "8080"
    restart: unless-stopped

volumes:
  payment_data:
