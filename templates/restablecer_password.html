<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Restablecer contraseña | CUCU</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Manrope:wght@400;500;700;800&display=swap');
    :root {
      --bg: #fdf8f3;
      --ink: #24262f;
      --muted: #73727c;
      --line: rgba(36, 38, 47, 0.1);
      --accent: #ff6a17;
      --accent-2: #ff5b0a;
      --shadow: 0 30px 80px rgba(255, 106, 23, 0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top, rgba(255, 106, 23, 0.08), transparent 24%), linear-gradient(180deg, #fffdfb 0%, var(--bg) 100%);
      color: var(--ink);
      font-family: 'Manrope', sans-serif;
    }
    .page { width: min(100%, 520px); margin: 0 auto; min-height: 100vh; padding: 38px 24px 28px; display: grid; align-content: center; gap: 24px; text-align: center; }
    .brand { display: inline-flex; align-items: center; justify-content: center; gap: 14px; font-family: 'Outfit', sans-serif; font-size: 34px; font-weight: 800; letter-spacing: -0.05em; }
    .brand-mark { width: 30px; height: 30px; border-radius: 8px; background: linear-gradient(135deg, var(--accent), var(--accent-2)); box-shadow: 0 12px 26px rgba(255, 91, 10, 0.28); }
    .card { padding: 28px; border-radius: 28px; background: rgba(255,255,255,0.82); border: 1px solid var(--line); box-shadow: var(--shadow); display: grid; gap: 18px; }
    h1 { margin: 0; font-family: 'Outfit', sans-serif; font-size: clamp(36px, 7vw, 50px); line-height: 1; letter-spacing: -0.06em; }
    p { margin: 0; color: var(--muted); line-height: 1.75; }
    .field { position: relative; }
    .field input { width: 100%; height: 58px; border-radius: 18px; border: 1px solid var(--line); background: rgba(255,255,255,0.96); padding: 0 54px 0 54px; font: inherit; color: var(--ink); outline: none; }
    .field input:focus { border-color: rgba(255, 106, 23, 0.38); box-shadow: 0 0 0 4px rgba(255, 106, 23, 0.08); }
    .field svg { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); width: 22px; height: 22px; color: #9a98a0; }
    .toggle-password { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); width: 26px; height: 26px; padding: 0; border: 0; background: transparent; color: #9a98a0; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; }
    .toggle-password svg { position: static; transform: none; width: 22px; height: 22px; }
    form { display: grid; gap: 16px; }
    .cta { width: 100%; height: 58px; border: 0; border-radius: 18px; background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #fff; font: inherit; font-size: 18px; font-weight: 800; cursor: pointer; box-shadow: 0 20px 34px rgba(255, 96, 16, 0.24); }
    .helper { color: var(--muted); font-size: 15px; }
    .helper a { color: var(--accent); font-weight: 800; }
    .out { margin: 0; padding: 14px 16px; border-radius: 16px; border: 1px solid var(--line); background: rgba(255,255,255,0.7); white-space: pre-wrap; text-align: left; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; display: none; }
    .out.ok, .out.err { display: block; }
    .out.ok { border-color: rgba(25, 165, 123, 0.24); background: rgba(25, 165, 123, 0.08); color: #126b51; }
    .out.err { border-color: rgba(218, 86, 86, 0.24); background: rgba(218, 86, 86, 0.08); color: #a63c3c; }
  </style>
</head>
<body>
  <main class="page">
    <div class="brand"><span class="brand-mark"></span><span>CUCU</span></div>
    <section class="card">
      <h1>Nueva contraseña</h1>
      <p>Ingresa una contraseña nueva para recuperar tu cuenta.</p>
      <form id="form">
        <div class="field">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M7 11h10v9H7z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M9 11V8a3 3 0 1 1 6 0v3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          <input name="password" type="password" required autocomplete="new-password" placeholder="Nueva contraseña" />
          <button class="toggle-password" type="button" data-target="password" aria-label="Mostrar u ocultar contraseña">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8"/></svg>
          </button>
        </div>
        <div class="field">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M7 11h10v9H7z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M9 11V8a3 3 0 1 1 6 0v3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          <input name="confirmPassword" type="password" required autocomplete="new-password" placeholder="Confirma tu contraseña" />
          <button class="toggle-password" type="button" data-target="confirmPassword" aria-label="Mostrar u ocultar confirmación de contraseña">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8"/></svg>
          </button>
        </div>
        <button class="cta" type="submit">Guardar contraseña</button>
      </form>
      <div class="helper"><a href="/ui/login/">Volver al login</a></div>
      <pre id="out" class="out" aria-live="polite"></pre>
    </section>
  </main>
  <script>
    const out = document.getElementById('out');
    const params = new URLSearchParams(window.location.search);
    const uid = params.get('uid') || '';
    const token = params.get('token') || '';

    document.querySelectorAll('.toggle-password').forEach((button) => {
      button.addEventListener('click', () => {
        const target = document.querySelector(`input[name="${button.dataset.target}"]`);
        if (!target) return;
        const visible = target.type === 'text';
        target.type = visible ? 'password' : 'text';
        button.style.color = visible ? '#9a98a0' : '#ff6a17';
      });
    });

    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      out.className = 'out';
      out.style.display = 'block';
      const data = Object.fromEntries(new FormData(e.target).entries());
      if (String(data.password || '') !== String(data.confirmPassword || '')) {
        out.classList.add('err');
        out.textContent = JSON.stringify({ status: 400, body: { detail: 'Las contraseñas no coinciden' } }, null, 2);
        return;
      }
      out.textContent = 'Procesando...';
      const res = await fetch('/api/password-reset/confirm', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ uid, token, password: data.password }),
      });
      const json = await res.json().catch(() => ({}));
      out.classList.add(res.ok ? 'ok' : 'err');
      out.textContent = JSON.stringify({ status: res.status, body: json }, null, 2);
      if (res.ok) {
        setTimeout(() => {
          window.location.href = '/ui/login/';
        }, 900);
      }
    });
  </script>
</body>
</html>
