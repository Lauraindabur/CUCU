{% load static %}
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Iniciar sesión | CUCU</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Manrope:wght@400;500;700;800&display=swap');

    :root {
      --bg: #fdf8f3;
      --ink: #24262f;
      --muted: #73727c;
      --line: rgba(36, 38, 47, 0.1);
      --accent: #ff6a17;
      --accent-2: #ff5b0a;
      --accent-soft: rgba(255, 106, 23, 0.12);
      --green: #19a57b;
      --shadow: 0 30px 80px rgba(255, 106, 23, 0.12);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(255, 106, 23, 0.08), transparent 24%),
        linear-gradient(180deg, #fffdfb 0%, var(--bg) 100%);
      color: var(--ink);
      font-family: 'Manrope', sans-serif;
    }

    a { color: inherit; text-decoration: none; }

    .auth-page {
      width: min(100%, 520px);
      margin: 0 auto;
      min-height: 100vh;
      padding: 30px 24px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: 18px;
      text-align: center;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      font-family: 'Outfit', sans-serif;
      font-size: 34px;
      font-weight: 800;
      letter-spacing: -0.05em;
    }

    .brand-mark {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 12px 26px rgba(255, 91, 10, 0.28);
      flex: 0 0 auto;
    }

    .hero {
      width: 100%;
      display: grid;
      gap: 12px;
      justify-items: center;
    }

    .hero h1 {
      margin: 0;
      font-family: 'Outfit', sans-serif;
      font-size: clamp(42px, 8vw, 58px);
      line-height: 0.98;
      letter-spacing: -0.06em;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      font-size: 17px;
    }

    .art {
      width: min(100%, 272px);
      aspect-ratio: 1;
      margin-top: 6px;
      border-radius: 999px;
      background:
        radial-gradient(circle at 50% 42%, rgba(255,255,255,0.95), rgba(255,255,255,0.4) 56%, transparent 72%),
        linear-gradient(180deg, #fff8f0 0%, #fff3e7 100%);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .art img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .form-wrap {
      width: 100%;
      display: grid;
      gap: 14px;
      margin-top: -6px;
    }

    form {
      display: grid;
      gap: 16px;
    }

    .field {
      position: relative;
    }

    .field input {
      width: 100%;
      height: 58px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.86);
      padding: 0 56px 0 54px;
      font: inherit;
      color: var(--ink);
      outline: none;
      box-shadow: 0 12px 28px rgba(255,255,255,0.42);
    }

    .field input:focus {
      border-color: rgba(255, 106, 23, 0.38);
      box-shadow: 0 0 0 4px rgba(255, 106, 23, 0.08);
    }

    .field svg {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      width: 22px;
      height: 22px;
      color: #9a98a0;
    }

    .field-actions {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      display: inline-flex;
      align-items: center;
      gap: 12px;
    }

    .password-help {
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
    }

    .toggle-password {
      width: 26px;
      height: 26px;
      padding: 0;
      border: 0;
      background: transparent;
      color: #9a98a0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .toggle-password svg {
      position: static;
      transform: none;
      width: 22px;
      height: 22px;
    }

    .row-between {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--ink);
      font-size: 15px;
      text-align: left;
    }

    .remember {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-weight: 700;
    }

    .remember input {
      width: 22px;
      height: 22px;
      accent-color: var(--green);
    }

    .cta {
      width: 100%;
      height: 58px;
      border: 0;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff;
      font: inherit;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 20px 34px rgba(255, 96, 16, 0.24);
    }

    .switch {
      color: var(--muted);
      font-size: 16px;
    }

    .switch a {
      color: var(--accent);
      font-weight: 800;
    }

    .out {
      display: none !important;
    }

    .footer {
      display: grid;
      gap: 18px;
      color: var(--muted);
      font-size: 14px;
      margin-top: auto;
      padding-top: 22px;
    }

    .footer-links {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
    }

    .footer-links span {
      opacity: 0.4;
    }
  </style>
</head>
<body>
  <main class="auth-page">
    <div class="brand"><span class="brand-mark"></span><span>CUCU</span></div>

    <section class="hero">
      <h1>Inicia sesión</h1>
      <p>Bienvenido a CUCU</p>
      <div class="art" aria-hidden="true"><img src="{% static 'images/1.png' %}" alt="Ilustración de inicio de sesión" /></div>
    </section>

    <section class="form-wrap">
      <form id="form">
        <div class="field">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M4 7h16v10H4z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="m5 8 7 5 7-5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <input name="email" type="email" required autocomplete="email" placeholder="Correo electrónico" />
        </div>
        <div class="field">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M7 11h10v9H7z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M9 11V8a3 3 0 1 1 6 0v3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          <input name="password" type="password" required autocomplete="current-password" placeholder="Contraseña" />
          <div class="field-actions">
            <button class="toggle-password" type="button" data-target="password" aria-label="Mostrar u ocultar contraseña">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8"/></svg>
            </button>
            <a class="password-help" href="/ui/recuperar-password/">¿Olvidaste tu contraseña?</a>
          </div>
        </div>
        <div class="row-between">
          <label class="remember"><input type="checkbox" name="remember" checked /> <span>Recuérdame</span></label>
        </div>
        <button class="cta" type="submit">Iniciar sesión</button>
      </form>

      <div class="switch">¿Eres nuevo en CUCU? <a href="/ui/registro/">Regístrate</a></div>
      <pre id="out" class="out" aria-live="polite"></pre>
    </section>

    <footer class="footer">
      <div class="footer-links">
        <a href="#">Términos</a>
        <span>|</span>
        <a href="#">Privacidad</a>
        <span>|</span>
        <a href="#">Soporte</a>
      </div>
      <div>© 2025 CUCU. Todos los derechos reservados.</div>
    </footer>
  </main>

  <script>
    const out = document.getElementById('out');
    const PREFETCH_CATALOG_CACHE_MS = 10 * 60 * 1000;
    const params = new URLSearchParams(window.location.search);
    const qsEmail = params.get('email');
    const savedEmail = localStorage.getItem('last_email');
    const emailInput = document.querySelector('input[name="email"]');
    if (emailInput && !emailInput.value) {
      emailInput.value = qsEmail || savedEmail || '';
    }

    function writeStorageJson(key, value) {
      try {
        localStorage.setItem(key, JSON.stringify(value));
      } catch {
        // ignore prefetch storage errors
      }
    }

    async function prefetchNearbyCatalog(accessToken) {
      if (!accessToken || !navigator.geolocation) return;

      const position = await new Promise((resolve) => {
        navigator.geolocation.getCurrentPosition(
          (coords) => resolve(coords),
          () => resolve(null),
          { enableHighAccuracy: false, timeout: 3500, maximumAge: 300000 }
        );
      });

      if (!position?.coords) return;

      const lat = Number(position.coords.latitude.toFixed(6));
      const lng = Number(position.coords.longitude.toFixed(6));
      const radioKm = 5;
      const params = new URLSearchParams({
        latitud: String(lat),
        longitud: String(lng),
        radio_km: String(radioKm),
      });

      const response = await fetch(`/api/publicaciones/cercanas?${params.toString()}`, {
        headers: {
          Accept: 'application/json',
          Authorization: `Bearer ${accessToken}`,
        },
      });
      const payload = await response.json().catch(() => null);
      if (!response.ok || !Array.isArray(payload)) return;

      writeStorageJson(`pubs_cercanas:${params.toString()}`, { ts: Date.now(), items: payload });
      writeStorageJson('last_user_location', { ts: Date.now(), lat, lng });
      writeStorageJson('last_catalog_state', {
        ts: Date.now(),
        radioKm,
        userLocation: { lat, lng },
        searchAddress: '',
        items: payload,
      });
      localStorage.setItem('publicaciones_sync_version', String(Date.now()));
    }

    async function tryRestoreSession() {
      const existingToken = localStorage.getItem('token');
      if (existingToken) {
        window.location.href = '/';
        return;
      }

      const refresh = localStorage.getItem('refresh');
      if (!refresh) return;

      const response = await fetch('/api/token/refresh', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ refresh }),
      });
      const payload = await response.json().catch(() => null);
      if (!response.ok || !payload?.access) {
        localStorage.removeItem('token');
        localStorage.removeItem('refresh');
        return;
      }

      localStorage.setItem('token', String(payload.access));
      if (payload.refresh) localStorage.setItem('refresh', String(payload.refresh));
      await prefetchNearbyCatalog(String(payload.access));
      window.location.href = '/';
    }

    tryRestoreSession();

    document.querySelectorAll('.toggle-password').forEach((button) => {
      button.addEventListener('click', () => {
        const target = document.querySelector(`input[name="${button.dataset.target}"]`);
        if (!target) return;
        const visible = target.type === 'text';
        target.type = visible ? 'password' : 'text';
        button.style.color = visible ? '#9a98a0' : '#ff6a17';
      });
    });

    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = Object.fromEntries(new FormData(e.target).entries());

      if (data.email) localStorage.setItem('last_email', String(data.email));

      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: data.email, password: data.password }),
      });

      const json = await res.json().catch(() => ({}));
      if (res.ok && json && typeof json === 'object') {
        if (json.access) localStorage.setItem('token', String(json.access));
        if (json.refresh) localStorage.setItem('refresh', String(json.refresh));
      }

      if (res.ok && json && typeof json === 'object' && json.access) {
        await prefetchNearbyCatalog(String(json.access));
        setTimeout(() => {
          window.location.href = '/';
        }, 700);
      }
    });
  </script>
</body>
</html>
