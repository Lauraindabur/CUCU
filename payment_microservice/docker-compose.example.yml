services:
  django:
    build:
      context: ..
    container_name: django-monolith
    expose:
      - "8000"

  payment-service:
    build:
      context: .
    container_name: payment-service
    environment:
      PAYMENTS_DATABASE_PATH: /app/data/payments.db
    volumes:
      - payment_data:/app/data
    expose:
      - "8080"

  nginx:
    image: nginx:1.27-alpine
    container_name: edge-nginx
    depends_on:
      - django
      - payment-service
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  payment_data:
