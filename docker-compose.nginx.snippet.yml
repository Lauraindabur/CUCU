services:
  nginx:
    image: nginx:1.27-alpine
    container_name: cucu-nginx
    depends_on:
      - django
      - payment-service
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped

  django:
    expose:
      - "8000"

  payment-service:
    expose:
      - "8080"